<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Il Battesimo di Lorenzo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="hero">
    <h1>Il Battesimo di Lorenzo</h1>
    <p>Mercoledì 26 agosto, ore 18:00</p>
    <p>Basilica dei Santi Cesidio e Rufino</p>
    <a href="https://maps.google.com/?q=Via Duca degli Abruzzi 2, Trasacco AQ" target="_blank">Apri la mappa della Basilica</a>
  </section>

  <section class="reception">
    <h2>Il ricevimento proseguirà presso:</h2>
    <p>Ristorante Il Granaio</p>
    <a href="https://maps.google.com/?q=Via IV Novembre 49, Trasacco AQ" target="_blank">Apri la mappa del Ristorante</a>
  </section>

  <section class="countdown">
    <h2>Manca poco ad un giorno speciale</h2>
    <div id="timer">00:00:00</div>
  </section>

  <section class="rsvp">
    <h2>Conferma la tua presenza su WhatsApp</h2>
    <form id="rsvpForm">
      <input type="text" id="name" placeholder="Il tuo nome" required>
      <button type="submit">Invia conferma</button>
    </form>
  </section>

  <script src="script.js"></script>
</body>
</html>
